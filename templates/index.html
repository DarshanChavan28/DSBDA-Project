<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Streaming Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Dashboard</h2>
        <nav>
            <a href="#" class="nav-btn active" data-target="home">Home</a>
            <a href="#" class="nav-btn" data-target="explore">Explore by Genre</a>
            <a href="#" class="nav-btn" data-target="top-rated">Top Rated</a>
        </nav>
    </div>

    <div class="main-content">
        <!-- Home Page -->
        <section id="home" class="page-section active">
            <div class="hero">
                <div class="hero-content">
                    <h1>Interstellar</h1>
                    <p>A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.</p>
                    <button class="play-btn">Play Now</button>
                </div>
            </div>
            
            <h3>🔥 Trending Now</h3>
            <div class="movie-grid" id="trending-grid">
                <!-- Loaded via JS -->
            </div>

            <hr>

            <h3>🎬 Recommend Similar Movies</h3>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search for a movie you like... (e.g., Avatar)">
                <button id="recommend-btn">Get Recommendations</button>
            </div>
            <div class="movie-grid" id="recommend-grid">
                <!-- Loaded via JS -->
            </div>
        </section>

        <!-- Explore by Genre Page -->
        <section id="explore" class="page-section">
            <h2>Explore by Genre</h2>
            <select id="genre-select">
                <!-- Loaded via JS -->
            </select>
            <div class="movie-grid" id="genre-grid">
                 <!-- Loaded via JS -->
            </div>
        </section>

        <!-- Top Rated Page -->
        <section id="top-rated" class="page-section">
            <h2>Top Rated Movies</h2>
            <div class="movie-grid" id="top-rated-grid">
                 <!-- Loaded via JS -->
            </div>
        </section>
    </div>

    <!-- Movie Details Modal -->
    <div class="modal-overlay" id="movie-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-modal">&times;</button>
            <div class="modal-body">
                <div class="modal-poster-container">
                    <img id="modal-poster" src="" alt="Poster">
                </div>
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <div class="modal-meta">
                        <span class="rating" id="modal-rating"></span>
                        <span class="year" id="modal-year"></span>
                    </div>
                    <p class="overview" id="modal-overview"></p>
                    <div class="credits">
                        <p><strong>Director:</strong> <span id="modal-director"></span></p>
                        <p><strong>Cast:</strong> <span id="modal-cast"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
